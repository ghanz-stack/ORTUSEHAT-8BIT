name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      # Regenerates all mipmap densities + adaptive icon XML from assets/*.svg.
      # Requires android/ platform already committed (npx cap add android, run once locally).
      - run: npx @capacitor/assets generate --android

      - run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: ortu-sehat-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
